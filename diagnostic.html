<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据诊断 - 云端院史馆</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background:#1a1a2e; color:#e0e0e0; padding:20px; }
    .container { max-width:900px; margin:0 auto; }
    h1 { color:#e94560; margin-bottom:20px; }
    .card { background:#16213e; border-radius:8px; padding:16px; margin-bottom:16px; border-left:4px solid #0f3460; }
    .card.ok { border-left-color:#00c853; }
    .card.warn { border-left-color:#ff9800; }
    .card.err { border-left-color:#e94560; }
    .card h3 { margin-bottom:8px; font-size:16px; }
    .card pre { background:#0f3460; padding:12px; border-radius:4px; overflow-x:auto; font-size:12px; margin-top:8px; white-space:pre-wrap; word-break:break-all; }
    .card .val { color:#64ffda; font-weight:bold; }
    .card .label { color:#8892b0; }
    button { background:#e94560; color:#fff; border:none; padding:8px 20px; border-radius:4px; cursor:pointer; font-size:14px; margin-right:8px; }
    button:hover { background:#c0392b; }
    button.secondary { background:#0f3460; }
    button.secondary:hover { background:#16213e; }
    .summary { display:flex; gap:16px; flex-wrap:wrap; }
    .summary-item { background:#16213e; border-radius:8px; padding:12px 20px; text-align:center; min-width:120px; }
    .summary-item .big { font-size:28px; font-weight:bold; color:#64ffda; }
    #rawPreview { max-height:400px; overflow-y:auto; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔍 数据诊断工具</h1>
  <p style="margin-bottom:20px;color:#8892b0;">
    当前页面 URL: <code class="val" id="myUrl"></code><br>
    Origin: <code class="val" id="myOrigin"></code>
  </p>

  <div class="summary" id="summaryCards"></div>

  <div class="card" id="cardStorage">
    <h3>📦 localStorage 状态</h3>
    <div id="storageInfo"></div>
  </div>

  <div class="card" id="cardStaff">
    <h3>👥 staff.profiles 状态</h3>
    <div id="staffInfo"></div>
  </div>

  <div class="card">
    <h3>📋 原始 hm_content JSON（前 5000 字符）</h3>
    <pre id="rawPreview">加载中...</pre>
  </div>

  <div style="margin-top:20px">
    <button onclick="location.reload()">🔄 刷新</button>
    <button class="secondary" onclick="clearStorage()">⚠️ 清空 localStorage</button>
    <button class="secondary" onclick="copyData()">📋 复制数据</button>
  </div>
</div>

<script>
document.getElementById('myUrl').textContent = window.location.href;
document.getElementById('myOrigin').textContent = window.location.origin || '(null origin)';

function checkStorage() {
  var html = '';
  var keys = [];
  for (var i = 0; i < localStorage.length; i++) {
    keys.push(localStorage.key(i));
  }
  html += '<p>localStorage 条目数: <b class="val">' + localStorage.length + '</b></p>';
  html += '<p>存在的 key:</p><ul>';
  keys.forEach(function(k) {
    var raw = localStorage.getItem(k);
    var len = raw ? raw.length : 0;
    html += '<li><code>' + k + '</code> — ' + (len/1024).toFixed(1) + ' KB</li>';
  });
  html += '</ul>';

  var raw = localStorage.getItem('hm_content');
  if (!raw) {
    html += '<p class="label">⚠️ hm_content 不存在</p>';
    document.getElementById('cardStorage').classList.add('err');
  } else {
    try {
      var obj = JSON.parse(raw);
      var sections = Object.keys(obj);
      html += '<p>hm_content sections: <b class="val">' + sections.length + '</b></p>';
      html += '<p>Sections: ' + sections.map(function(s) {
        var c = obj[s];
        var profiles = (c && Array.isArray(c.profiles)) ? c.profiles.length : 0;
        return '<code>' + s + '</code>(' + profiles + '条profile)';
      }).join(', ') + '</p>';

      if (obj.staff) {
        var sp = Array.isArray(obj.staff.profiles) ? obj.staff.profiles : [];
        html += '<p>staff.profiles: <b class="val">' + sp.length + ' 条</b></p>';
        if (sp.length > 0) {
          html += '<p>示例：</p><ul>';
          sp.slice(0, 5).forEach(function(p) {
            html += '<li>' + (p.name || '(无名)') + ' — ' + (p.dept || '') + ' — ' + (p.title || '') + '</li>';
          });
          html += '</ul>';
        }
      } else {
        html += '<p class="label">⚠️ staff section 不存在</p>';
        document.getElementById('cardStorage').classList.add('warn');
      }

      document.getElementById('cardStorage').classList.add('ok');
    } catch(e) {
      html += '<p class="label">❌ JSON 解析失败: ' + e.message + '</p>';
      document.getElementById('cardStorage').classList.add('err');
    }
  }

  document.getElementById('storageInfo').innerHTML = html;

  // Raw preview
  var preview = localStorage.getItem('hm_content') || '(无数据)';
  if (preview.length > 5000) preview = preview.substring(0, 5000) + '... [截断]';
  document.getElementById('rawPreview').textContent = preview;

  // Summary cards
  var sumHtml = '';
  sumHtml += '<div class="summary-item"><div class="big">' + localStorage.length + '</div><div>localStorage 条目</div></div>';
  try {
    var c = JSON.parse(localStorage.getItem('hm_content') || '{}');
    var sc = c.staff && Array.isArray(c.staff.profiles) ? c.staff.profiles.length : 0;
    sumHtml += '<div class="summary-item"><div class="big">' + sc + '</div><div>staff.profiles</div></div>';
    sumHtml += '<div class="summary-item"><div class="big">' + Object.keys(c).length + '</div><div>sections</div></div>';
    sumHtml += '<div class="summary-item"><div class="big">' + (JSON.stringify(c).length/1024).toFixed(1) + ' KB</div><div>数据大小</div></div>';
  } catch(e) {}
  document.getElementById('summaryCards').innerHTML = sumHtml;

  // Staff detail
  var sh = '';
  try {
    var c2 = JSON.parse(localStorage.getItem('hm_content') || '{}');
    var sp2 = c2.staff && Array.isArray(c2.staff.profiles) ? c2.staff.profiles : [];
    if (sp2.length === 0) {
      sh = '<p class="label">⚠️ 无职工数据</p>';
      document.getElementById('cardStaff').classList.add('warn');
    } else {
      sh = '<p>共 <b class="val">' + sp2.length + '</b> 条职工记录</p>';
      sh += '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;">';
      sh += '<tr style="background:#0f3460"><th style="padding:6px 8px;text-align:left">#</th><th style="padding:6px 8px;text-align:left">姓名</th><th style="padding:6px 8px;text-align:left">科室</th><th style="padding:6px 8px;text-align:left">职称</th><th style="padding:6px 8px;text-align:left">职位</th></tr>';
      sp2.forEach(function(p, i) {
        sh += '<tr style="border-bottom:1px solid #0f3460"><td style="padding:4px 8px">' + (i+1) + '</td><td style="padding:4px 8px">' + (p.name||'') + '</td><td style="padding:4px 8px">' + (p.dept||'') + '</td><td style="padding:4px 8px">' + (p.title||'') + '</td><td style="padding:4px 8px">' + (p.position||'') + '</td></tr>';
      });
      sh += '</table>';
      document.getElementById('cardStaff').classList.add('ok');
    }
  } catch(e) {
    sh = '<p class="label">❌ 解析失败: ' + e.message + '</p>';
    document.getElementById('cardStaff').classList.add('err');
  }
  document.getElementById('staffInfo').innerHTML = sh;
}

function clearStorage() {
  if (confirm('确定清空所有 localStorage 数据吗？这将删除所有编辑内容！此操作不可恢复。')) {
    localStorage.clear();
    alert('已清空');
    location.reload();
  }
}

function copyData() {
  var raw = localStorage.getItem('hm_content') || '';
  if (navigator.clipboard) {
    navigator.clipboard.writeText(raw).then(function() { alert('已复制到剪贴板'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = raw;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('已复制到剪贴板');
  }
}

checkStorage();
</script>
</body>
</html>
